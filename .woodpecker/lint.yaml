when:
  - event: pull_request
    branch: main
  - event: push
    branch: main
  - event: release

steps:
  - name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    commands:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: jdx/mise-action@c53b9236f0b3370f31520f8b142f141256d839c6 # v3.6.0
        with:
          install: true
          cache: true

      # You don't have to run `mise build` because
      # `mise lint` runs `mise build` before test and lint.
      - run: mise lint

      - name: Quick test for mise tasks - mise release:readme
        run: mise release:readme
      - name: Quick test for mise tasks - mise versions
        run: mise versions
